<html>
    <head>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: Arial, sans-serif;
            }

            #video {
                width: 100vw;
                height: 60vh;
                object-fit: contain;
                display: block;
            }

            #controls {
                width: 100vw;
                height: 30vh;
                padding: 10px;
            }

            label {
                display: block;
                margin: 5px 0;
            }

            input[type=range], input[type=number], input[type=color], select {
                margin-left: 10px;
            }

            input[type=range]{
                width: 70vw;
            }

            button {
                padding: 10px 20px;       /* bigger clickable area */
                font-size: 16px;          /* larger text */
                border-radius: 6px;       /* rounded corners */
                border: none;             /* clean look */
                cursor: pointer;
                margin-left: 8px;
            }

            button:hover {
            }

        </style>

    </head>

    <body>
        <h1>ChipieCam</h1>
        <img id="video" src="/video"/>
        <div id="controls">
            <h3>LED Controls</h3>
            <label>LED 0:
                <input id="led0" type="range" min="0" max="255" value="0" oninput="updateLED(0,this.value)">
                <input id="led0num" type="number" min="0" max="255" value="0">
                <button onclick="sendLED(0)">Set</button>
                <button onclick="onLED(0)">OFF</button>
                <button onclick="offLED(0)">ON</button>
            </label>
            <label>LED 1:
                <input id="led1" type="range" min="0" max="255" value="0" oninput="updateLED(1,this.value)">
                <input id="led1num" type="number" min="0" max="255" value="0">
                <button onclick="sendLED(1)">Set</button>
                <button onclick="onLED(1)">OFF</button>
                <button onclick="offLED(1)">ON</button>
            </label>
            <label>LED 2:
                <input id="led2" type="range" min="0" max="255" value="0" oninput="updateLED(2,this.value)">
                <input id="led2num" type="number" min="0" max="255" value="0">
                <button onclick="sendLED(2)">Set</button>
                <button onclick="onLED(2)">OFF</button>
                <button onclick="offLED(2)">ON</button>
            </label>

            <h3>Video Resolution</h3>
            <select id="resolutionSelect" onchange="changeResolution(this.value)">
                <option value="320x240">320x240</option>
                <option value="640x480">640x480</option>
                <option value="1280x720">1280x720</option>
            </select>
        </div>
        <script>
            function changeResolution(value) {
                let parts = value.split("x");
                fetch('/set_resolution', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                  body: 'width=' + parts[0] + '&height=' + parts[1]
                });
            }

            function updateLED(id, duty) {
                document.getElementById("led" + id + "num").value = duty;
                fetch('/led/' + id, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                  body: 'duty=' + duty
                });
            }

            function sendLED(id) {
                let duty = document.getElementById("led" + id + "num").value;
                document.getElementById("led" + id).value = duty;
                fetch('/led/' + id, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                  body: 'duty=' + duty
                });
            }

            function offLED(id) {
                fetch('/led/' + id, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                  body: 'duty=0'
                });
            }

            function onLED(id) {
                fetch('/led/' + id, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                  body: 'duty=255'
                });
            }
        </script>
    </body>
</html>
