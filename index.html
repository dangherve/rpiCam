<html>
    <head>
        <link rel="stylesheet" href="chipieCam.css">
        <meta charset="UTF-8">
    </head>

    <body>
        <h1>✨ ChipieCam Control Panel ✨</h1>
        <h2>
            Websocket status <span id="websocketStatus" >&#128308</span>
            Camera status <span id="cameraStatus" >&#128308</span>
            Status <span id="status" ></span>
        </h2>
        <script>
            now = new Date()
            document.getElementById('status').innerText = now.toLocaleTimeString("fr-FR");
        </script>
<!--
    <button class="btn-on" onclick="fetch('/start_websocket')">start_websocket</button>
    <button class="btn-on" onclick="fetch('/start_camera')">start_camera</button>
    <button class="btn-on" onclick="updateWebsocketStatus()">updateWebsocketStatus</button>
-->
        <video id="video" controls autoplay>Waiting ....</video>

        <div id="controls">
            <h3>💡 LED Controls</h3>

            <label>
                <div class="row">
                    <span class="led">Cool White:</span>
    <!--
                    <input id="led0" type="range" min="0" max="255" value="0" oninput="updateLED(0,this.value)">
                    <input id="led0num" type="number" min="0" max="255" value="0">
                    <button class="btn-set" onclick="sendLED(0)">Set</button>
    -->
                    <button class="btn-on" onclick="onLED(0)">ON</button>
                    <button class="btn-off" onclick="offLED(0)">OFF</button>
                </div>
            </label>

            <label>
                <div class="row">
                    <span class="led">Warm White:</span>
    <!--
                    <input id="led1" type="range" min="0" max="255" value="0" oninput="updateLED(1,this.value)">
                    <input id="led1num" type="number" min="0" max="255" value="0">
                    <button class="btn-set" onclick="sendLED(1)">Set</button>
    -->
                    <button class="btn-on" onclick="onLED(1)">ON</button>
                    <button class="btn-off" onclick="offLED(1)">OFF</button>
                </div>
            </label>

            <label>
                <div class="row">
                    <span class="led">InfraRed:</span>
    <!--
                    <input id="led2" type="range" min="0" max="255" value="0" oninput="updateLED(2,this.value)">
                    <input id="led2num" type="number" min="0" max="255" value="0">
                    <button class="btn-set" onclick="sendLED(2)">Set</button>
    -->
                    <button class="btn-on" onclick="onLED(2)">ON</button>
                    <button class="btn-off" onclick="offLED(2)">OFF</button>
                </div>
            </label>

            <h3>🎥 Video Resolution</h3>
            <select id="resolutionSelect" onchange="changeResolution(this.value)">
                <option value="320x240">320x240</option>
                <option value="640x480">640x480</option>
                <option value="1280x720">1280x720</option>
            </select>
        </div>
        <script src="./mpegts.js"></script>
        <script src="./chipieCam.js"></script>

        <script>setInterval(startChipieCam, 60*1000)</script>

    </body>
</html>
